<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planning Engine</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9deea;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --soft: #e8f4f2;
      --code: #101828;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15,118,110,.08), transparent 32%),
        linear-gradient(315deg, rgba(37,99,235,.07), transparent 28%),
        var(--bg);
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 0.8fr) minmax(480px, 1.2fr);
      gap: 16px;
      padding: 16px;
    }

    .panel {
      min-height: 0;
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(217, 222, 234, .9);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(16, 24, 40, .08);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1, h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 { font-size: 20px; }
    h2 { font-size: 15px; color: var(--muted); font-weight: 600; }

    .status {
      min-width: 92px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--muted);
      background: #fff;
    }

    .messages {
      overflow: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 92%;
      border-radius: 8px;
      padding: 12px 14px;
      line-height: 1.45;
      font-size: 14px;
      border: 1px solid var(--line);
      background: #fff;
      white-space: pre-wrap;
    }

    .bubble.user {
      align-self: flex-end;
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .bubble.assistant {
      align-self: flex-start;
    }

    .bubble.assistant ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: rgba(255, 255, 255, .84);
    }

    textarea {
      width: 100%;
      min-height: 54px;
      max-height: 160px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
      background: #fff;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .13);
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--accent-strong); }
    button:disabled { cursor: not-allowed; opacity: .55; }

    .viewer {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .viewer-tools {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tool {
      color: var(--accent);
      background: var(--soft);
      border: 1px solid rgba(15, 118, 110, .18);
      padding: 8px 10px;
      font-size: 12px;
    }

    pre {
      margin: 0;
      min-height: 0;
      overflow: auto;
      padding: 18px;
      color: #d0d5dd;
      background: var(--code);
      font: 13px/1.55 Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
      tab-size: 2;
    }

    .empty {
      color: #98a2b3;
    }

    @media (max-width: 900px) {
      .shell {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }
      .panel {
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel chat" aria-label="Planning chatbot">
      <header class="header">
        <div>
          <h1>AI App Planner</h1>
          <h2>Describe an app. Get a master plan.</h2>
        </div>
        <div id="status" class="status">Ready</div>
      </header>

      <div id="messages" class="messages"></div>

      <form id="form" class="composer">
        <textarea id="prompt" placeholder="Example: Build a personal gym meal tracker with Firebase login and meal logging"></textarea>
        <button id="send" type="submit">Generate</button>
      </form>
    </section>

    <section class="panel viewer" aria-label="Master plan JSON">
      <header class="header">
        <div>
          <h1>master_plan.json</h1>
          <h2 id="jsonMeta">Generated plan appears here</h2>
        </div>
        <div class="viewer-tools">
          <button id="copy" class="tool" type="button">Copy JSON</button>
          <button id="clear" class="tool" type="button">Clear Cache</button>
        </div>
      </header>
      <pre id="json"><span class="empty">No plan generated yet.</span></pre>
    </section>
  </main>

  <script>
    const form = document.querySelector("#form");
    const promptInput = document.querySelector("#prompt");
    const messages = document.querySelector("#messages");
    const statusEl = document.querySelector("#status");
    const sendButton = document.querySelector("#send");
    const jsonEl = document.querySelector("#json");
    const jsonMeta = document.querySelector("#jsonMeta");
    const copyButton = document.querySelector("#copy");
    const clearButton = document.querySelector("#clear");

    const cacheKey = "planning_engine_view_state_v1";
    let currentPlan = null;

    function saveState() {
      const state = {
        messages: messages.innerHTML,
        prompt: promptInput.value,
        plan: currentPlan,
        jsonMeta: jsonMeta.textContent
      };
      localStorage.setItem(cacheKey, JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem(cacheKey);
      if (!raw) {
        addAssistant("Tell me what app you want to build, and I will generate the master plan.");
        return;
      }
      try {
        const state = JSON.parse(raw);
        messages.innerHTML = state.messages || "";
        promptInput.value = state.prompt || "";
        currentPlan = state.plan || null;
        jsonMeta.textContent = state.jsonMeta || "Generated plan appears here";
        renderJson(currentPlan);
      } catch {
        addAssistant("Tell me what app you want to build, and I will generate the master plan.");
      }
    }

    function addBubble(text, type) {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${type}`;
      bubble.textContent = text;
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
      saveState();
    }

    function addAssistant(text) {
      addBubble(text, "assistant");
    }

    function addHighlights(highlights, costSummary) {
      const bubble = document.createElement("div");
      bubble.className = "bubble assistant";
      const title = document.createElement("div");
      title.textContent = "Plan generated. Main points:";
      bubble.appendChild(title);
      const list = document.createElement("ul");
      highlights.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
      });
      bubble.appendChild(list);
      if (costSummary) {
        const cost = document.createElement("div");
        cost.style.marginTop = "10px";
        cost.style.color = "#667085";
        cost.textContent = costSummary.replaceAll("\\n", "  ");
        bubble.appendChild(cost);
      }
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
      saveState();
    }

    function renderJson(plan) {
      if (!plan) {
        jsonEl.innerHTML = '<span class="empty">No plan generated yet.</span>';
        return;
      }
      jsonEl.textContent = JSON.stringify(plan, null, 2);
    }

    function setBusy(isBusy) {
      statusEl.textContent = isBusy ? "Working" : "Ready";
      sendButton.disabled = isBusy;
      promptInput.disabled = isBusy;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      addBubble(prompt, "user");
      setBusy(true);
      addAssistant("Generating the plan now. This can take a little while.");

      try {
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Plan generation failed.");
        }
        currentPlan = data.plan;
        renderJson(currentPlan);
        jsonMeta.textContent = `${data.plan_path}`;
        addHighlights(data.highlights || [], data.cost_summary || "");
      } catch (error) {
        addAssistant(`I could not generate the plan: ${error.message}`);
      } finally {
        setBusy(false);
        saveState();
      }
    });

    copyButton.addEventListener("click", async () => {
      if (!currentPlan) return;
      await navigator.clipboard.writeText(JSON.stringify(currentPlan, null, 2));
      statusEl.textContent = "Copied";
      setTimeout(() => statusEl.textContent = "Ready", 1200);
    });

    clearButton.addEventListener("click", () => {
      localStorage.removeItem(cacheKey);
      currentPlan = null;
      messages.innerHTML = "";
      promptInput.value = "";
      jsonMeta.textContent = "Generated plan appears here";
      renderJson(null);
      addAssistant("Cache cleared. Send a new app idea when ready.");
    });

    promptInput.addEventListener("input", saveState);
    loadState();
  </script>
</body>
</html>

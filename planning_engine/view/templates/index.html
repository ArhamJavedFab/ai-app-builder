<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planning Engine</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050807;
      --panel: #09110f;
      --panel-strong: #0c1714;
      --ink: #d8ffe9;
      --muted: #7ca991;
      --line: #17382d;
      --accent: #20f28a;
      --accent-strong: #74ffd0;
      --cyan: #1bd8ff;
      --danger: #ff4d8d;
      --soft: #0d251d;
      --code: #020504;
      --shadow: rgba(0, 255, 128, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(32, 242, 138, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(32, 242, 138, .035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(27, 216, 255, .08), transparent 36%),
        var(--bg);
      background-size: 34px 34px, 34px 34px, auto;
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 0.8fr) minmax(480px, 1.2fr);
      gap: 16px;
      padding: 16px;
    }

    .panel {
      min-height: 0;
      background: linear-gradient(180deg, rgba(12, 23, 20, .98), rgba(5, 10, 8, .98));
      border: 1px solid rgba(32, 242, 138, .18);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, .34), 0 0 26px var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1, h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 20px;
      color: var(--accent-strong);
      text-shadow: 0 0 18px rgba(32, 242, 138, .22);
    }

    h2 {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .status {
      min-width: 92px;
      text-align: center;
      border: 1px solid rgba(32, 242, 138, .34);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--accent);
      background: rgba(32, 242, 138, .08);
      box-shadow: inset 0 0 18px rgba(32, 242, 138, .05);
    }

    .messages {
      overflow: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background:
        linear-gradient(180deg, rgba(32, 242, 138, .025), transparent 28%),
        var(--panel);
    }

    .bubble {
      max-width: min(92%, 720px);
      border-radius: 18px;
      padding: 13px 15px;
      line-height: 1.5;
      font-size: 14px;
      border: 1px solid rgba(32, 242, 138, .18);
      background: rgba(8, 18, 15, .92);
      white-space: pre-wrap;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .2);
      overflow-wrap: anywhere;
    }

    .bubble.user {
      align-self: flex-end;
      color: #03100a;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      border-color: rgba(116, 255, 208, .62);
      border-bottom-right-radius: 6px;
      box-shadow: 0 0 24px rgba(32, 242, 138, .16);
    }

    .bubble.assistant {
      align-self: flex-start;
      color: var(--ink);
      background: linear-gradient(180deg, rgba(13, 37, 29, .98), rgba(7, 16, 13, .98));
      border-color: rgba(27, 216, 255, .26);
      border-bottom-left-radius: 6px;
    }

    .bubble.assistant ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: var(--panel-strong);
    }

    textarea {
      width: 100%;
      min-height: 54px;
      max-height: 160px;
      resize: vertical;
      color: var(--ink);
      border: 1px solid rgba(32, 242, 138, .25);
      border-radius: 8px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
      background: #030705;
    }

    textarea::placeholder { color: #557766; }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(32, 242, 138, .12), 0 0 22px rgba(32, 242, 138, .1);
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      color: #03100a;
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(32, 242, 138, .18);
    }

    button:hover { background: var(--accent-strong); }
    button:disabled { cursor: not-allowed; opacity: .55; }

    .viewer {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .viewer-tools {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tool {
      color: var(--accent);
      background: rgba(32, 242, 138, .08);
      border: 1px solid rgba(32, 242, 138, .28);
      padding: 8px 10px;
      font-size: 12px;
      box-shadow: none;
    }

    .tool:hover {
      color: #03100a;
      background: var(--accent);
    }

    pre {
      margin: 0;
      min-height: 0;
      overflow: auto;
      padding: 18px;
      color: #b9ffd7;
      background: var(--code);
      font: 13px/1.55 Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
      tab-size: 2;
    }

    .empty {
      color: #5f8d73;
    }

    @media (max-width: 900px) {
      .shell {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }
      .panel {
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel chat" aria-label="Planning chatbot">
      <header class="header">
        <div>
          <h1>AI App Planner</h1>
          <h2>Describe an app. Get a master plan.</h2>
        </div>
        <div id="status" class="status">Ready</div>
      </header>

      <div id="messages" class="messages"></div>

      <form id="form" class="composer">
        <textarea id="prompt" placeholder="Example: Build a personal gym meal tracker with Firebase login and meal logging"></textarea>
        <button id="send" type="submit">Generate</button>
      </form>
    </section>

    <section class="panel viewer" aria-label="Master plan JSON">
      <header class="header">
        <div>
          <h1>master_plan.json</h1>
          <h2 id="jsonMeta">Generated plan appears here</h2>
        </div>
        <div class="viewer-tools">
          <button id="copy" class="tool" type="button">Copy JSON</button>
          <button id="clear" class="tool" type="button">Clear Cache</button>
        </div>
      </header>
      <pre id="json"><span class="empty">No plan generated yet.</span></pre>
    </section>
  </main>

  <script>
    const form = document.querySelector("#form");
    const promptInput = document.querySelector("#prompt");
    const messages = document.querySelector("#messages");
    const statusEl = document.querySelector("#status");
    const sendButton = document.querySelector("#send");
    const jsonEl = document.querySelector("#json");
    const jsonMeta = document.querySelector("#jsonMeta");
    const copyButton = document.querySelector("#copy");
    const clearButton = document.querySelector("#clear");

    const cacheKey = "planning_engine_view_state_v1";
    let currentPlan = null;
    let flow = {
      mode: "idle",
      prompt: "",
      intent: null,
      questions: [],
      answers: {},
      questionIndex: 0
    };

    function saveState() {
      const state = {
        messages: messages.innerHTML,
        prompt: promptInput.value,
        plan: currentPlan,
        jsonMeta: jsonMeta.textContent,
        flow
      };
      localStorage.setItem(cacheKey, JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem(cacheKey);
      if (!raw) {
        addAssistant("Tell me what app you want to build, and I will generate the master plan.");
        return;
      }
      try {
        const state = JSON.parse(raw);
        messages.innerHTML = state.messages || "";
        promptInput.value = state.prompt || "";
        currentPlan = state.plan || null;
        flow = state.flow || flow;
        jsonMeta.textContent = state.jsonMeta || "Generated plan appears here";
        renderJson(currentPlan);
      } catch {
        addAssistant("Tell me what app you want to build, and I will generate the master plan.");
      }
    }

    function addBubble(text, type) {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${type}`;
      bubble.textContent = text;
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
      saveState();
    }

    function addAssistant(text) {
      addBubble(text, "assistant");
    }

    function questionText(question) {
      const examples = (question.examples || question.options || []).slice(0, 2);
      if (!examples.length) return question.question || "";
      return `${question.question} (e.g. ${examples.join(", ")})`;
    }

    function askCurrentQuestion() {
      const question = flow.questions[flow.questionIndex];
      if (!question) {
        generateWithAnswers();
        return;
      }
      let text = questionText(question);
      if (question.default_answer) {
        text += `\nPress Enter to use ${question.default_answer}.`;
      }
      addAssistant(text);
    }

    async function startQuestionFlow(prompt) {
      setBusy(true);
      addAssistant("I will ask a few quick questions first.");
      try {
        const response = await fetch("/api/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Could not prepare questions.");
        }
        flow = {
          mode: "questions",
          prompt,
          intent: data.intent,
          questions: data.questions || [],
          answers: {},
          questionIndex: 0
        };
        if (!flow.questions.length) {
          await generateWithAnswers();
          return;
        }
        askCurrentQuestion();
      } catch (error) {
        addAssistant(`I could not start planning: ${error.message}`);
        flow.mode = "idle";
      } finally {
        setBusy(false);
        saveState();
      }
    }

    async function handleQuestionAnswer(answer) {
      const question = flow.questions[flow.questionIndex];
      if (!question) return;
      flow.answers[question.id] = answer || question.default_answer || "";
      flow.questionIndex += 1;
      saveState();
      if (flow.questionIndex < flow.questions.length) {
        askCurrentQuestion();
        return;
      }
      await generateWithAnswers();
    }

    async function generateWithAnswers() {
      setBusy(true);
      addAssistant("Generating the plan now. This can take a little while.");

      try {
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: flow.prompt,
            intent: flow.intent,
            questions: flow.questions,
            answers: flow.answers
          })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Plan generation failed.");
        }
        currentPlan = data.plan;
        renderJson(currentPlan);
        jsonMeta.textContent = `${data.plan_path}`;
        addHighlights(data.highlights || [], data.cost_summary || "");
        flow.mode = "idle";
      } catch (error) {
        addAssistant(`I could not generate the plan: ${error.message}`);
      } finally {
        setBusy(false);
        saveState();
      }
    }

    function addHighlights(highlights, costSummary) {
      const bubble = document.createElement("div");
      bubble.className = "bubble assistant";
      const title = document.createElement("div");
      title.textContent = "Plan generated. Main points:";
      bubble.appendChild(title);
      const list = document.createElement("ul");
      highlights.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
      });
      bubble.appendChild(list);
      if (costSummary) {
        const cost = document.createElement("div");
        cost.style.marginTop = "10px";
        cost.style.color = "#667085";
        cost.textContent = costSummary.replaceAll("\\n", "  ");
        bubble.appendChild(cost);
      }
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
      saveState();
    }

    function renderJson(plan) {
      if (!plan) {
        jsonEl.innerHTML = '<span class="empty">No plan generated yet.</span>';
        return;
      }
      jsonEl.textContent = JSON.stringify(plan, null, 2);
    }

    function setBusy(isBusy) {
      statusEl.textContent = isBusy ? "Working" : "Ready";
      sendButton.disabled = isBusy;
      promptInput.disabled = isBusy;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const prompt = promptInput.value.trim();
      if (!prompt && flow.mode !== "questions") return;

      const activeQuestion = flow.mode === "questions" ? flow.questions[flow.questionIndex] : null;
      const visiblePrompt = prompt || (activeQuestion && activeQuestion.default_answer) || "";
      if (visiblePrompt) {
        addBubble(visiblePrompt, "user");
      }
      promptInput.value = "";

      if (flow.mode === "questions") {
        await handleQuestionAnswer(prompt);
      } else {
        await startQuestionFlow(prompt);
      }
    });

    copyButton.addEventListener("click", async () => {
      if (!currentPlan) return;
      await navigator.clipboard.writeText(JSON.stringify(currentPlan, null, 2));
      statusEl.textContent = "Copied";
      setTimeout(() => statusEl.textContent = "Ready", 1200);
    });

    clearButton.addEventListener("click", () => {
      localStorage.removeItem(cacheKey);
      currentPlan = null;
      flow = {
        mode: "idle",
        prompt: "",
        intent: null,
        questions: [],
        answers: {},
        questionIndex: 0
      };
      messages.innerHTML = "";
      promptInput.value = "";
      jsonMeta.textContent = "Generated plan appears here";
      renderJson(null);
      addAssistant("Cache cleared. Send a new app idea when ready.");
    });

    promptInput.addEventListener("input", saveState);
    loadState();
  </script>
</body>
</html>
